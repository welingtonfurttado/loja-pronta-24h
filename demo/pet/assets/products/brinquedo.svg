<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <radialGradient id="bgbx" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </radialGradient>
    <radialGradient id="bxball" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="45%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <radialGradient id="bxshine" cx="32%" cy="25%" r="38%">
      <stop offset="0%" stop-color="rgba(255,255,255,.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="bxdrop">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#14532d" flood-opacity=".3"/>
    </filter>
    <filter id="bxblur"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <rect width="480" height="480" fill="url(#bgbx)"/>
  <ellipse cx="240" cy="454" rx="138" ry="18" fill="#14532d" opacity=".12" filter="url(#bxblur)"/>

  <!-- BALL -->
  <circle cx="240" cy="230" r="172" fill="url(#bxball)" filter="url(#bxdrop)"/>

  <!-- SEAM CURVES (soccer ball-style) -->
  <path d="M112 112 Q240 186 368 112" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M68  230 Q240 286 412 230" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M112 348 Q240 274 368 348" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M172  68 Q196 230 172 392" fill="none" stroke="rgba(255,255,255,.2)"  stroke-width="3" stroke-linecap="round"/>
  <path d="M308  68 Q284 230 308 392" fill="none" stroke="rgba(255,255,255,.2)"  stroke-width="3" stroke-linecap="round"/>

  <!-- PAW PRINT (large, centered) -->
  <g fill="rgba(255,255,255,.55)">
    <ellipse cx="234" cy="228" rx="32" ry="26"/>
    <circle cx="190" cy="196" r="14"/>
    <circle cx="234" cy="183" r="14"/>
    <circle cx="278" cy="196" r="14"/>
  </g>

  <!-- SHINE overlay -->
  <circle cx="240" cy="230" r="172" fill="url(#bxshine)"/>
  <!-- Secondary shine spot -->
  <ellipse cx="188" cy="158" rx="52" ry="34" fill="rgba(255,255,255,.28)" transform="rotate(-28,188,158)"/>
</svg>