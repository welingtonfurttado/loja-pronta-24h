<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <radialGradient id="bgtap" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </radialGradient>
    <filter id="tapdrop">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="rgba(0,0,0,.2)"/>
    </filter>
    <filter id="tapblur"><feGaussianBlur stdDeviation="2.5"/></filter>
    <linearGradient id="tapedge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="480" fill="url(#bgtap)"/>
  <ellipse cx="240" cy="456" rx="162" ry="16" fill="rgba(0,0,0,.08)" filter="url(#tapblur)"/>

  <!-- MAIN PAD BODY -->
  <rect x="54" y="84" width="372" height="292" rx="28" fill="#f8fafc" stroke="#e2e8f0" stroke-width="3" filter="url(#tapdrop)"/>

  <!-- TOP COLOR BAND -->
  <rect x="54" y="84" width="372" height="40" rx="28 28 0 0" fill="#eff6ff"/>
  <rect x="54" y="104" width="372" height="20" fill="#eff6ff"/>

  <!-- GRID LINES vertical -->
  <line x1="178" y1="84"  x2="178" y2="376" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="302" y1="84"  x2="302" y2="376" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- GRID LINES horizontal -->
  <line x1="54"  y1="182" x2="426" y2="182" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="54"  y1="280" x2="426" y2="280" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ABSORBENCY DOT GRID -->
  <g fill="#bfdbfe" opacity=".85">
    <circle cx="116" cy="133" r="5"/><circle cx="240" cy="133" r="5"/><circle cx="364" cy="133" r="5"/>
    <circle cx="116" cy="231" r="5"/><circle cx="240" cy="231" r="5"/><circle cx="364" cy="231" r="5"/>
    <circle cx="116" cy="328" r="5"/><circle cx="240" cy="328" r="5"/><circle cx="364" cy="328" r="5"/>
  </g>

  <!-- CENTER BADGE -->
  <rect x="172" y="198" width="136" height="56" rx="14" fill="rgba(59,130,246,.1)" stroke="rgba(59,130,246,.2)" stroke-width="1.5"/>
  <text x="240" y="225" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="800" font-family="sans-serif">HIGIENE+</text>
  <text x="240" y="244" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="600" font-family="sans-serif">ULTRA ABSORVENTE</text>

  <!-- BLUE INDICATOR STRIP bottom -->
  <rect x="54" y="344" width="372" height="32" rx="0 0 28 28" fill="#bfdbfe" opacity=".55"/>
  <text x="240" y="365" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="800" font-family="sans-serif">&#128167; INDICADOR DE UMIDADE</text>

  <!-- CORNER RINGS -->
  <circle cx="90"  cy="118" r="8" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="390" cy="118" r="8" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="90"  cy="342" r="8" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="390" cy="342" r="8" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <!-- PACKAGE COUNT badge top-right -->
  <rect x="340" y="88" width="80" height="32" rx="0 28 0 12" fill="#3b82f6"/>
  <text x="380" y="109" text-anchor="middle" font-size="12" fill="#fff" font-weight="800" font-family="sans-serif">30 UN</text>
</svg>