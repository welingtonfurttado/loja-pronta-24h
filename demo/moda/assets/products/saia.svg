<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <radialGradient id="bgsa" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </radialGradient>
    <linearGradient id="sawaist" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="saskirt" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="40%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="saside" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity=".7"/>
      <stop offset="35%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity=".55"/>
    </linearGradient>
    <linearGradient id="safront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sadrop">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#312e81" flood-opacity=".3"/>
    </filter>
    <filter id="sablur"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <rect width="480" height="480" fill="url(#bgsa)"/>
  <ellipse cx="240" cy="454" rx="118" ry="14" fill="#312e81" opacity=".1" filter="url(#sablur)"/>

  <!-- A-LINE SKIRT BODY -->
  <path d="M168 128 Q128 220 88 452 L392 452 Q352 220 312 128 Z"
        fill="url(#saskirt)" filter="url(#sadrop)"/>
  <!-- Side shadow depth -->
  <path d="M168 128 Q128 220 88 452 L392 452 Q352 220 312 128 Z"
        fill="url(#saside)"/>
  <!-- Front panel highlight -->
  <path d="M200 128 Q185 220 168 452 L312 452 Q295 220 280 128 Z"
        fill="url(#safront)" opacity=".6"/>

  <!-- Pleat lines (fabric movement) -->
  <path d="M240 130 L240 450"  fill="none" stroke="rgba(255,255,255,.18)" stroke-width="2"/>
  <path d="M210 132 L190 450"  fill="none" stroke="rgba(255,255,255,.1)"  stroke-width="1.5"/>
  <path d="M270 132 L290 450"  fill="none" stroke="rgba(255,255,255,.1)"  stroke-width="1.5"/>
  <path d="M184 136 L152 450"  fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1.5"/>
  <path d="M296 136 L328 450"  fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1.5"/>
  <path d="M160 142 L118 450"  fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>
  <path d="M320 142 L362 450"  fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1.5"/>

  <!-- Hem detail -->
  <path d="M88 448 Q240 460 392 448" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="2.5"/>
  <path d="M90 444 Q240 456 390 444" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1"/>

  <!-- WAISTBAND -->
  <rect x="163" y="112" width="154" height="22" fill="url(#sawaist)" rx="8"/>
  <rect x="163" y="112" width="154" height="22" fill="rgba(255,255,255,.1)" rx="8"/>
  <!-- Waistband seam -->
  <line x1="163" y1="124" x2="317" y2="124" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
  <!-- Zipper -->
  <rect x="232" y="114" width="16" height="18" fill="rgba(255,255,255,.22)" rx="4"/>
  <line x1="240" y1="116" x2="240" y2="130" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>
  <!-- Zipper pull -->
  <rect x="234" y="124" width="12" height="6" rx="2" fill="rgba(255,255,255,.4)"/>
  <!-- Waistband shine -->
  <ellipse cx="200" cy="119" rx="28" ry="5" fill="rgba(255,255,255,.2)"/>
</svg>