<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <radialGradient id="bgbl" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </radialGradient>
    <linearGradient id="blbody" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="blpuff" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <radialGradient id="blshine" cx="30%" cy="22%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="blside" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity=".55"/>
      <stop offset="45%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity=".4"/>
    </linearGradient>
    <filter id="bldrop">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1d4ed8" flood-opacity=".28"/>
    </filter>
    <filter id="blblur"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <rect width="480" height="480" fill="url(#bgbl)"/>
  <ellipse cx="240" cy="448" rx="115" ry="14" fill="#1d4ed8" opacity=".1" filter="url(#blblur)"/>

  <!-- PUFF SLEEVES -->
  <!-- Left puff sleeve -->
  <ellipse cx="108" cy="182" rx="68" ry="52" fill="url(#blpuff)" filter="url(#bldrop)"/>
  <ellipse cx="108" cy="182" rx="68" ry="52" fill="url(#blside)" opacity=".5"/>
  <ellipse cx="90" cy="168" rx="28" ry="18" fill="rgba(255,255,255,.22)"/>
  <!-- Left cuff -->
  <ellipse cx="122" cy="228" rx="28" ry="12" fill="#1d4ed8"/>
  <ellipse cx="122" cy="226" rx="22" ry="7" fill="rgba(255,255,255,.15)"/>

  <!-- Right puff sleeve -->
  <ellipse cx="372" cy="182" rx="68" ry="52" fill="url(#blpuff)" filter="url(#bldrop)"/>
  <ellipse cx="372" cy="182" rx="68" ry="52" fill="url(#blside)" opacity=".5"/>
  <ellipse cx="354" cy="168" rx="28" ry="18" fill="rgba(255,255,255,.22)"/>
  <!-- Right cuff -->
  <ellipse cx="358" cy="228" rx="28" ry="12" fill="#1d4ed8"/>
  <ellipse cx="358" cy="226" rx="22" ry="7" fill="rgba(255,255,255,.15)"/>

  <!-- BODY -->
  <path d="M152 118 L138 230 L138 380 Q138 394 152 394 L328 394 Q342 394 342 380 L342 230 L328 118 Q284 96 240 92 Q196 96 152 118 Z"
        fill="url(#blbody)" filter="url(#bldrop)"/>
  <path d="M152 118 L138 230 L138 380 Q138 394 152 394 L328 394 Q342 394 342 380 L342 230 L328 118 Q284 96 240 92 Q196 96 152 118 Z"
        fill="url(#blside)" opacity=".45"/>
  <path d="M152 118 L138 230 L138 380 Q138 394 152 394 L328 394 Q342 394 342 380 L342 230 L328 118 Q284 96 240 92 Q196 96 152 118 Z"
        fill="url(#blshine)"/>

  <!-- V neckline -->
  <path d="M200 116 Q240 162 280 116" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="3"/>
  <path d="M200 116 Q240 162 280 116" fill="none" stroke="#1d4ed8" stroke-width="1.5" opacity=".35"/>

  <!-- Chest button placket -->
  <rect x="234" y="165" width="12" height="180" fill="rgba(255,255,255,.07)" rx="4"/>
  <!-- Buttons -->
  <circle cx="240" cy="185" r="6" fill="rgba(255,255,255,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
  <circle cx="240" cy="210" r="6" fill="rgba(255,255,255,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
  <circle cx="240" cy="235" r="6" fill="rgba(255,255,255,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
  <circle cx="240" cy="260" r="6" fill="rgba(255,255,255,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>

  <!-- Fabric horizontal texture -->
  <g stroke="rgba(255,255,255,.07)" stroke-width="1">
    <line x1="140" y1="150" x2="340" y2="150"/>
    <line x1="140" y1="180" x2="340" y2="180"/>
    <line x1="140" y1="280" x2="340" y2="280"/>
    <line x1="140" y1="320" x2="340" y2="320"/>
    <line x1="140" y1="360" x2="340" y2="360"/>
  </g>

  <!-- Hem bottom -->
  <path d="M138 384 Q240 396 342 384" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="2"/>
</svg>