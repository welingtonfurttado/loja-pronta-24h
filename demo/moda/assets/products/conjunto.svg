<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <radialGradient id="bgcj" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#fdf8f4"/>
      <stop offset="100%" stop-color="#f5ede6"/>
    </radialGradient>
    <linearGradient id="cjtop" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#c08b5a"/>
      <stop offset="100%" stop-color="#92653a"/>
    </linearGradient>
    <linearGradient id="cjpant" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#a67c52"/>
      <stop offset="100%" stop-color="#6b4423"/>
    </linearGradient>
    <linearGradient id="cjside" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4423" stop-opacity=".55"/>
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#6b4423" stop-opacity=".4"/>
    </linearGradient>
    <radialGradient id="cjshine" cx="32%" cy="25%" r="38%">
      <stop offset="0%" stop-color="rgba(255,255,255,.48)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="cjdrop">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#6b4423" flood-opacity=".25"/>
    </filter>
    <filter id="cjblur"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <rect width="480" height="480" fill="url(#bgcj)"/>
  <ellipse cx="240" cy="450" rx="110" ry="15" fill="#6b4423" opacity=".1" filter="url(#cjblur)"/>

  <!-- PANTS LEFT LEG -->
  <path d="M150 258 L134 440 Q180 452 240 448 L240 258 Z"
        fill="url(#cjpant)" filter="url(#cjdrop)"/>
  <!-- PANTS RIGHT LEG -->
  <path d="M330 258 L346 440 Q300 452 240 448 L240 258 Z"
        fill="url(#cjpant)" filter="url(#cjdrop)"/>
  <!-- Center seam pants -->
  <line x1="240" y1="262" x2="240" y2="446" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>
  <!-- Pants shadow sides -->
  <path d="M150 258 L134 440 Q180 452 240 448 L240 258 Z" fill="url(#cjside)" opacity=".6"/>
  <path d="M330 258 L346 440 Q300 452 240 448 L240 258 Z" fill="url(#cjside)" opacity=".6"/>
  <!-- Pants fold lines -->
  <path d="M175 260 Q164 340 155 440" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
  <path d="M305 260 Q316 340 325 440" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>

  <!-- WAISTBAND -->
  <rect x="148" y="248" width="184" height="16" fill="#6b4423" rx="6"/>
  <!-- Belt detail -->
  <rect x="222" y="244" width="36" height="24" rx="7" fill="#a67c52" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
  <rect x="230" y="250" width="20" height="12" rx="4" fill="rgba(255,255,255,.18)"/>

  <!-- TOP / BLUSA -->
  <path d="M178 108 Q158 84 132 74 L98 100 L118 148 L144 132
           L144 250 Q192 262 240 258 Q288 262 336 250
           L336 132 L362 148 L382 100 L348 74 Q322 84 302 108
           Q274 88 240 84 Q206 88 178 108 Z"
        fill="url(#cjtop)" filter="url(#cjdrop)"/>
  <!-- Top side shadows -->
  <path d="M178 108 Q158 84 132 74 L98 100 L118 148 L144 132
           L144 250 Q192 262 240 258 Q288 262 336 250
           L336 132 L362 148 L382 100 L348 74 Q322 84 302 108
           Q274 88 240 84 Q206 88 178 108 Z"
        fill="url(#cjside)" opacity=".45"/>
  <!-- Top shine -->
  <path d="M178 108 Q158 84 132 74 L98 100 L118 148 L144 132
           L144 250 Q192 262 240 258 Q288 262 336 250
           L336 132 L362 148 L382 100 L348 74 Q322 84 302 108
           Q274 88 240 84 Q206 88 178 108 Z"
        fill="url(#cjshine)"/>
  <!-- V-neckline -->
  <path d="M205 106 Q240 142 275 106" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2.5"/>
  <!-- Button row -->
  <circle cx="240" cy="160" r="5" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
  <circle cx="240" cy="180" r="5" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
  <circle cx="240" cy="200" r="5" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
  <circle cx="240" cy="220" r="5" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
  <!-- Linen texture lines -->
  <g stroke="rgba(255,255,255,.08)" stroke-width="1">
    <line x1="145" y1="140" x2="335" y2="140"/>
    <line x1="145" y1="158" x2="335" y2="158"/>
    <line x1="145" y1="176" x2="335" y2="176"/>
    <line x1="145" y1="194" x2="335" y2="194"/>
    <line x1="145" y1="212" x2="335" y2="212"/>
    <line x1="145" y1="230" x2="335" y2="230"/>
  </g>
</svg>