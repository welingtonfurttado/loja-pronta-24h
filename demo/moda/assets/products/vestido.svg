<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <radialGradient id="bgv" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </radialGradient>
    <linearGradient id="bodice" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="skirt" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="40%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <linearGradient id="vshadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d174d" stop-opacity=".5"/>
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#9d174d" stop-opacity=".35"/>
    </linearGradient>
    <radialGradient id="vshine" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="vdrop">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#be185d" flood-opacity=".28"/>
    </filter>
    <filter id="vblur"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <!-- Studio background -->
  <rect width="480" height="480" fill="url(#bgv)"/>
  <!-- Ground shadow (ellipse) -->
  <ellipse cx="240" cy="450" rx="120" ry="18" fill="#be185d" opacity=".12" filter="url(#vblur)"/>

  <!-- === DRESS === -->
  <!-- Skirt full A-line -->
  <path d="M166 210 Q130 280 96 440 L384 440 Q350 280 314 210 Z"
        fill="url(#skirt)" filter="url(#vdrop)"/>
  <!-- Skirt shadow sides -->
  <path d="M166 210 Q130 280 96 440 L384 440 Q350 280 314 210 Z"
        fill="url(#vshadow)"/>
  <!-- Skirt fold lines (fabric texture) -->
  <path d="M202 225 Q190 310 175 440" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="1.5"/>
  <path d="M240 220 Q240 320 240 440"  fill="none" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
  <path d="M278 225 Q290 310 305 440" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="1.5"/>
  <path d="M310 225 Q332 300 358 440" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>
  <path d="M170 225 Q148 300 122 440" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>

  <!-- Waist seam / belt -->
  <path d="M162 210 Q240 220 318 210" fill="none" stroke="#9d174d" stroke-width="4" opacity=".6"/>
  <path d="M165 214 Q240 226 315 214" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="2"/>

  <!-- Bodice -->
  <path d="M174 95 Q158 70 136 62 L102 85 L120 128 L140 118
           L140 212 Q190 222 240 220 Q290 222 340 212 L340 118
           L360 128 L378 85 L344 62 Q322 70 306 95
           Q278 72 240 68 Q202 72 174 95 Z"
        fill="url(#bodice)"/>
  <!-- Bodice shadow overlay -->
  <path d="M174 95 Q158 70 136 62 L102 85 L120 128 L140 118
           L140 212 Q190 222 240 220 Q290 222 340 212 L340 118
           L360 128 L378 85 L344 62 Q322 70 306 95
           Q278 72 240 68 Q202 72 174 95 Z"
        fill="url(#vshadow)" opacity=".5"/>
  <!-- Bodice shine -->
  <path d="M174 95 Q158 70 136 62 L102 85 L120 128 L140 118
           L140 212 Q190 222 240 220 Q290 222 340 212 L340 118
           L360 128 L378 85 L344 62 Q322 70 306 95
           Q278 72 240 68 Q202 72 174 95 Z"
        fill="url(#vshine)"/>

  <!-- V-neckline detail -->
  <path d="M204 92 Q240 132 276 92" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="2.5"/>
  <path d="M204 92 Q240 132 276 92" fill="none" stroke="#9d174d" stroke-width="1" opacity=".4"/>

  <!-- Sleeves short -->
  <path d="M140 118 L102 85 Q140 70 174 95 Z" fill="#db2777" opacity=".9"/>
  <path d="M340 118 L378 85 Q340 70 306 95 Z" fill="#db2777" opacity=".9"/>

  <!-- Straps -->
  <rect x="208" y="68" width="16" height="30" rx="8" fill="#be185d"/>
  <rect x="256" y="68" width="16" height="30" rx="8" fill="#be185d"/>

  <!-- Floral print on skirt -->
  <g opacity=".38">
    <!-- flower 1 -->
    <circle cx="185" cy="300" r="10" fill="#fff"/><circle cx="185" cy="300" r="5" fill="#fde68a"/>
    <circle cx="175" cy="293" r="5" fill="#fff"/><circle cx="195" cy="293" r="5" fill="#fff"/>
    <circle cx="175" cy="307" r="5" fill="#fff"/><circle cx="195" cy="307" r="5" fill="#fff"/>
    <!-- flower 2 -->
    <circle cx="255" cy="340" r="9" fill="#fff"/><circle cx="255" cy="340" r="4.5" fill="#fde68a"/>
    <circle cx="245" cy="333" r="4.5" fill="#fff"/><circle cx="265" cy="333" r="4.5" fill="#fff"/>
    <circle cx="245" cy="347" r="4.5" fill="#fff"/><circle cx="265" cy="347" r="4.5" fill="#fff"/>
    <!-- flower 3 -->
    <circle cx="315" cy="290" r="9" fill="#fff"/><circle cx="315" cy="290" r="4.5" fill="#fde68a"/>
    <circle cx="305" cy="283" r="4.5" fill="#fff"/><circle cx="325" cy="283" r="4.5" fill="#fff"/>
    <circle cx="305" cy="297" r="4.5" fill="#fff"/><circle cx="325" cy="297" r="4.5" fill="#fff"/>
    <!-- flower 4 small -->
    <circle cx="220" cy="390" r="7" fill="#fff"/><circle cx="220" cy="390" r="3.5" fill="#fde68a"/>
    <circle cx="213" cy="384" r="3.5" fill="#fff"/><circle cx="227" cy="384" r="3.5" fill="#fff"/>
    <!-- flower 5 small -->
    <circle cx="295" cy="370" r="7" fill="#fff"/><circle cx="295" cy="370" r="3.5" fill="#fde68a"/>
    <circle cx="288" cy="364" r="3.5" fill="#fff"/><circle cx="302" cy="364" r="3.5" fill="#fff"/>
    <!-- leaf accents -->
    <ellipse cx="200" cy="318" rx="7" ry="3" fill="#86efac" transform="rotate(-30 200 318)"/>
    <ellipse cx="270" cy="355" rx="6" ry="2.5" fill="#86efac" transform="rotate(20 270 355)"/>
    <ellipse cx="305" cy="308" rx="6" ry="2.5" fill="#86efac" transform="rotate(-15 305 308)"/>
  </g>
</svg>