  <line x1="1050" y1="-50" x2="1400" y2="540" stroke="rgba(255,255,255,0.02)" stroke-width="40"/>

  <!-- Jersey 3 - Brasil (back-right) -->
  <rect transform="translate(880,110) scale(1.8) rotate(10 50 60)" width="100" height="120" fill="#ca8a04" clip-path="url(#sj2)"/>
  <rect transform="translate(880,110) scale(1.8) rotate(10 50 60)" y="0" width="100" height="20" fill="#15803d" clip-path="url(#sj2)"/>
  <path transform="translate(880,110) scale(1.8) rotate(10 50 60)" d="M28 16 Q38 9 42 7 Q46 12 50 12 Q54 12 58 7 Q62 9 72 16 L93 28 L81 44 L73 38 L73 108 L27 108 L27 38 L19 44 L7 28 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Jersey 2 - Palmeiras (back-left) -->
  <rect transform="translate(600,110) scale(1.8) rotate(-12 50 60)" width="100" height="120" fill="#166534" clip-path="url(#sj3)"/>
  <rect transform="translate(600,110) scale(1.8) rotate(-12 50 60)" x="40" width="20" height="120" fill="rgba(255,255,255,0.12)" clip-path="url(#sj3)"/>
  <path transform="translate(600,110) scale(1.8) rotate(-12 50 60)" d="M28 16 Q38 9 42 7 Q46 12 50 12 Q54 12 58 7 Q62 9 72 16 L93 28 L81 44 L73 38 L73 108 L27 108 L27 38 L19 44 L7 28 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Jersey 1 - Flamengo (front center) -->
  <rect transform="translate(720,80) scale(2.2)" width="100" height="120" fill="#dc2626" clip-path="url(#sj1)"/>
  <rect transform="translate(720,80) scale(2.2)" y="30" width="100" height="12" fill="#1a1a1a" clip-path="url(#sj1)"/>
  <rect transform="translate(720,80) scale(2.2)" y="56" width="100" height="12" fill="#1a1a1a" clip-path="url(#sj1)"/>
