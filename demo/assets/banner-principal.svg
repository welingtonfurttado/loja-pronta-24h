    <!-- Jersey clip paths for standalone -->
    <clipPath id="sj1"><path d="M28 16 Q38 9 42 7 Q46 12 50 12 Q54 12 58 7 Q62 9 72 16 L93 28 L81 44 L73 38 L73 108 L27 108 L27 38 L19 44 L7 28 Z" transform="translate(720,80) scale(2.2)"/></clipPath>
