<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>LP24 — Favicon</title>

  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="12" fill="#0f172a"/>

  <!-- Borda interna sutil -->
  <rect x="3" y="3" width="58" height="58" rx="9"
        fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>

  <!-- LP em branco -->
  <text x="32" y="42" text-anchor="middle"
        font-family="'Arial Black','Arial Bold',Impact,sans-serif"
        font-size="36" font-weight="900">
    <tspan fill="#ffffff">LP</tspan><tspan fill="#22d3ee">24</tspan>
  </text>

</svg>
